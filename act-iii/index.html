<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description" content="Act-III — Streaming musical collaboratif en temps réel" />
  <title>Act-III</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════ -->
  <!-- HEADER                                     -->
  <!-- ══════════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo-group">
        <span class="logo-badge">◆</span>
        <h1 class="logo-title">Act<span class="logo-dash">-</span>III</h1>
      </div>
      <div class="header-meta">
        <span class="live-dot" id="liveIndicator" title="Temps réel actif"></span>
        <span class="live-label">LIVE</span>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════════ -->
  <!-- SEARCH BAR                                 -->
  <!-- ══════════════════════════════════════════ -->
  <div class="search-wrapper">
    <div class="search-inner">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Titre, artiste…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-clear" id="searchClear" aria-label="Effacer">✕</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════ -->
  <!-- MAIN CONTENT                               -->
  <!-- ══════════════════════════════════════════ -->
  <main class="main-content">

    <!-- Tabs / Sort info -->
    <div class="list-header">
      <span class="list-count" id="songCount">— titres</span>
      <span class="list-sort">↓ Plus récents</span>
    </div>

    <!-- Song list -->
    <ul class="song-list" id="songList" role="list">
      <!-- Songs rendered by JS -->
    </ul>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-icon">♩</div>
      <p class="empty-title">Aucune musique pour le moment</p>
      <p class="empty-sub">Soyez le premier à en ajouter une !</p>
    </div>

    <!-- No results state -->
    <div class="no-results" id="noResults" hidden>
      <div class="empty-icon">⌕</div>
      <p class="empty-title">Aucun résultat</p>
      <p class="empty-sub">Essayez un autre titre ou artiste.</p>
    </div>

  </main>

  <!-- ══════════════════════════════════════════ -->
  <!-- FLOATING ADD BUTTON                        -->
  <!-- ══════════════════════════════════════════ -->
  <button class="fab" id="fabBtn" aria-label="Ajouter une musique">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- ══════════════════════════════════════════ -->
  <!-- MODAL ADD SONG                             -->
  <!-- ══════════════════════════════════════════ -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Ajouter une musique" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">Nouvelle musique</h2>
        <button class="modal-close" id="modalClose" aria-label="Fermer">✕</button>
      </div>

      <div class="modal-body">
        <div class="field-group">
          <label class="field-label" for="inputTitle">Titre *</label>
          <input
            type="text"
            id="inputTitle"
            class="field-input"
            placeholder="Ex : Giorno's Theme"
            autocomplete="off"
            maxlength="100"
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="inputArtist">Artiste *</label>
          <input
            type="text"
            id="inputArtist"
            class="field-input"
            placeholder="Ex : Yugo Kanno"
            autocomplete="off"
            maxlength="100"
          />
        </div>

        <p class="field-error" id="formError" hidden></p>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancel">Annuler</button>
        <button class="btn-submit" id="btnSubmit">
          <span id="btnSubmitLabel">Ajouter</span>
          <span class="btn-loader" id="btnLoader" hidden></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════ -->
  <!-- MINI PLAYER                                -->
  <!-- ══════════════════════════════════════════ -->
  <div class="player" id="player">
    <div class="player-info">
      <div class="player-disc" id="playerDisc">
        <span class="player-disc-inner">◆</span>
      </div>
      <div class="player-text">
        <p class="player-title" id="playerTitle">Aucune piste sélectionnée</p>
        <p class="player-artist" id="playerArtist">—</p>
      </div>
    </div>
    <div class="player-controls">
      <button class="player-btn play-btn" id="playBtn" aria-label="Play / Pause">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
